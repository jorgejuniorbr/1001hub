    function calculatePlacement({ requestedDeliveries, marginPercentage = 5, averageDailyDeliveries, entryDate }) {
      const deliveriesWithMargin = Math.ceil(requestedDeliveries * (1 + marginPercentage / 100));
      if (averageDailyDeliveries <= 0) {
        return { deliveriesWithMargin, requiredDays: 0, estimatedExitDate: entryDate, estimatedDeliveries: 0 };
      }
      const requiredDays = Math.ceil(deliveriesWithMargin / averageDailyDeliveries);
      const entryDateObj = new Date(entryDate + 'T12:00:00');
      const exitDateObj = new Date(entryDateObj.getTime());
      exitDateObj.setDate(entryDateObj.getDate() + requiredDays);
      const estimatedExitDate = exitDateObj.toISOString().split('T')[0];
      const estimatedDeliveries = requiredDays * averageDailyDeliveries;
      return { deliveriesWithMargin, requiredDays, estimatedExitDate, estimatedDeliveries };
    }

    function getOperationalStatus({ estimatedExitDate, realExitDate, isRemoved, currentDateStr }) {
      if (isRemoved || realExitDate) return 'REMOVIDA';
      const current = new Date(currentDateStr + 'T00:00:00');
      const exit = new Date(estimatedExitDate + 'T00:00:00');
      const diffTime = exit.getTime() - current.getTime();
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      if (diffDays < 0) return 'ATRASADA';
      if (diffDays === 0) return 'REMOVER_HOJE';
      if (diffDays > 0 && diffDays <= 3) return 'PROXIMA_REMOCAO';
      return 'ATIVA';

      state.positions.push({
        id: 'pos_' + Math.random().toString(36).substr(2, 9),
        list_id: listId,
        position_label: label,
        position_number: num || (currentListPositions.length + 1),
        average_daily_deliveries: avg,
        status: 'active',
        created_at: new Date().toISOString()
      });

      saveState();
      form.reset();
      render();
    }

    function deletePosition(posId) {
      state.positions = state.positions.filter(p => p.id !== posId);

      render();
    }

    function importPositionsBulk(e) {
      e.preventDefault();
      const text = e.target.bulkText.value.trim();
      const listId = state.selectedListForPositions.id;
      if (!text) return;

      const currentListPositions = state.positions.filter(p => p.list_id === listId);
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

      if (currentListPositions.length + lines.length > 120) {
        alert(`Erro: A importação excede o limite. A lista já possui ${currentListPositions.length} posições. Limite máximo: 120.`);
        return;
      }

      let successCount = 0;
      lines.forEach((line) => {
        try {
          const parts = line.split(/[;,—\t]| - /).map(p => p.trim());
          let label = '';
          let delivStr = '';

          if (parts.length >= 2) {
            label = parts[0];
            delivStr = parts[1];
          } else {
            const lastSpace = line.lastIndexOf(' ');
            if (lastSpace !== -1) {
              label = line.substring(0, lastSpace).trim();
              delivStr = line.substring(lastSpace).trim();
            } else {
              return;
            }
          }

          const avg = parseInt(delivStr.replace(/[^\d]/g, ''), 10);
          if (isNaN(avg)) return;

          const numMatch = label.match(/\d+/);
          const num = numMatch ? parseInt(numMatch[0], 10) : (currentListPositions.length + successCount + 1);

          const existIdx = state.positions.findIndex(p => p.list_id === listId && p.position_label.toLowerCase() === label.toLowerCase());
          const newPos = {
            id: existIdx !== -1 ? state.positions[existIdx].id : 'pos_' + Math.random().toString(36).substr(2, 9),
            list_id: listId,
            position_label: label,
            position_number: num,
            average_daily_deliveries: avg,
            status: 'active',
            created_at: new Date().toISOString()
          };

          if (existIdx !== -1) {
            state.positions[existIdx] = newPos;
          } else {
            state.positions.push(newPos);
          }
          successCount++;
        } catch (err) {}
      });

      saveState();
      alert(`Importadas ${successCount} posições com sucesso!`);
      e.target.reset();
      render();
    }

    function savePlacement(e) {
      e.preventDefault();
      const trackId = state.form.trackId;
      const listId = state.form.listId;
      const positionId = state.form.positionId;
      const entryDate = state.form.entryDate;
      const marginPercentage = state.form.marginPercentage;

      if (!trackId || !listId || !positionId) {
        alert('Por favor, selecione a Música, Lista e Posição.');
        return;
      }

      const track = state.tracks.find(t => t.id === trackId);
      const list = state.lists.find(l => l.id === listId);
      const position = state.positions.find(p => p.id === positionId);

      if (!track || !list || !position) return;

      const calc = calculatePlacement({
        requestedDeliveries: track.requested_deliveries,
        marginPercentage,
        averageDailyDeliveries: position.average_daily_deliveries,
        entryDate
      });

      state.placements.unshift({
        id: 'p_' + Math.random().toString(36).substr(2, 9),
        track_id: trackId,
        client_id: track.client_id,
        list_id: listId,
        curator_id: list.curator_id,
        position_id: positionId,
        entry_date: entryDate,
        requested_deliveries: track.requested_deliveries,
        margin_percentage: marginPercentage,
        deliveries_with_margin: calc.deliveriesWithMargin,
        average_daily_deliveries: position.average_daily_deliveries, // Snapshot histórico
        required_days: calc.requiredDays,
        estimated_exit_date: calc.estimatedExitDate,
        estimated_deliveries: calc.estimatedDeliveries,
        status: 'active',
        notes: state.form.notes,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      });

      // Atualiza status da música para Delivering
      state.tracks = state.tracks.map(t => t.id === trackId ? { ...t, status: 'delivering' } : t);

      saveState();
      closeModal();
    }

    function handleRemovePlacementSubmit(e) {
      e.preventDefault();
      const id = e.target.placementId.value;
      const notes = e.target.removalNotes.value;
      const realExitDate = e.target.realExitDate.value;

      state.placements = state.placements.map(p => {
        if (p.id === id) {
          return {
            ...p,
            status: 'removed',
            real_exit_date: realExitDate,
            removal_notes: notes,
            updated_at: new Date().toISOString()
          };
        }
        return p;
      });

      // Atualiza status da música se não houver mais alocações ativas
      const placement = state.placements.find(p => p.id === id);
      if (placement) {
        const hasActive = state.placements.some(p => p.id !== id && p.track_id === placement.track_id && p.status === 'active');
        if (!hasActive) {
          state.tracks = state.tracks.map(t => t.id === placement.track_id ? { ...t, status: 'delivered' } : t);
        }
      }

      saveState();
      closeModal();
    }

    function exportToCSV() {
      let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
      const headers = ["Música", "Cliente", "Lista", "Média Posição", "Data Entrada", "Data Saída Estimada", "Entregas Solicitadas", "Entregas Estimadas", "Status"];
      csvContent += headers.join(",") + "\n";

      state.placements.forEach(p => {
        const track = state.tracks.find(t => t.id === p.track_id);
        const client = state.clients.find(c => c.id === p.client_id);
        const list = state.lists.find(l => l.id === p.list_id);
        const row = [
          track ? `${track.artist_name} - ${track.track_name}` : 'N/A',
          client ? client.name : 'N/A',
          list ? list.name : 'N/A',
          p.average_daily_deliveries,
          p.entry_date,
          p.estimated_exit_date,
          p.requested_deliveries,
          p.estimated_deliveries,
          p.status === 'active' ? 'Ativa' : 'Removida'
        ];
        csvContent += row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",") + "\n";
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "mvt_placements_report.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // ==========================================
    // RENDER: INCLUSÕES ATIVAS
    // ==========================================
    function renderPlacements(target) {
      const active = state.placements.filter(p => p.status === 'active');
      
      const filtered = active.map(p => {
        const track = state.tracks.find(t => t.id === p.track_id);
        const client = state.clients.find(c => c.id === p.client_id);
        const list = state.lists.find(l => l.id === p.list_id);
        const position = state.positions.find(pos => pos.id === p.position_id);
        const opStatus = getOperationalStatus({
          estimatedExitDate: p.estimated_exit_date,
          isRemoved: false,
          currentDateStr: state.currentDate
        });

        const current = new Date(state.currentDate + 'T00:00:00');
        const exit = new Date(p.estimated_exit_date + 'T00:00:00');
        const diffDays = Math.ceil((exit.getTime() - current.getTime()) / (1000 * 60 * 60 * 24));

        return {
          ...p,
          trackName: track ? `${track.artist_name} - ${track.track_name}` : 'N/A',
          clientName: client ? client.name : 'N/A',
          listName: list ? list.name : 'N/A',
          positionLabel: position ? position.position_label : 'N/A',
          opStatus,
          diffDays
        };
      }).filter(item => {
        const query = state.searchQuery.toLowerCase();
        const matchesSearch = query === '' || 
          item.trackName.toLowerCase().includes(query) ||
          item.clientName.toLowerCase().includes(query) ||
          item.listName.toLowerCase().includes(query);

        const matchesClient = state.filters.client === '' || item.client_id === state.filters.client;
        const matchesList = state.filters.list === '' || item.list_id === state.filters.list;
        const matchesStatus = state.filters.status === '' || item.opStatus === state.filters.status;

        return matchesSearch && matchesClient && matchesList && matchesStatus;
      });

      target.innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-center">

            <select

                      </td>

                <label class="text-[10px] text-zinc-400 font-bold uppercase">Música</label>
                <select name="trackId" required onchange="updateFormLive('trackId', this.value)" class="w-full bg-zinc-900 border border-border rounded-xl px-4 py-2.5 text-xs text-zinc-400 focus:outline-none focus:border-violetAccent mt-1">
                  <option value="">Selecione a música...</option>
                  ${activeTracks.map(t => `<option value="${t.id}">${t.artist_name} - ${t.track_name} (Meta: ${t.requested_deliveries.toLocaleString()})</option>`).join('')}
                </select>
              </div>

              <div>
                <label class="text-[10px] text-zinc-400 font-bold uppercase">Lista</label>
                <select name="listId" required onchange="updateFormLive('listId', this.value); renderModal();" class="w-full bg-zinc-900 border border-border rounded-xl px-4 py-2.5 text-xs text-zinc-400 focus:outline-none focus:border-violetAccent mt-1">
                  <option value="">Selecione a lista...</option>
                  ${activeLists.map(l => `<option value="${l.id}" ${state.form.listId === l.id ? 'selected' : ''}>${l.name}</option>`).join('')}
                </select>
              </div>

              <div>
                <label class="text-[10px] text-zinc-400 font-bold uppercase">Posição</label>
                <select name="positionId" required onchange="updateFormLive('positionId', this.value)" ${!currentListId ? 'disabled' : ''} class="w-full bg-zinc-900 border border-border rounded-xl px-4 py-2.5 text-xs text-zinc-400 focus:outline-none focus:border-violetAccent mt-1 disabled:opacity-40">
                  <option value="">Selecione a posição...</option>
                  ${currentPositions.map(pos => `<option value="${pos.id}">${pos.position_label} (Média: ${pos.average_daily_deliveries.toLocaleString()}/dia)</option>`).join('')}
                </select>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="text-[10px] text-zinc-400 font-bold uppercase">Data de Entrada</label>
                  <input type="date" name="entryDate" value="${state.form.entryDate}" onchange="updateFormLive('entryDate', this.value)" class="w-full bg-zinc-900 border border-border rounded-xl px-4 py-2.5 text-xs text-zinc-200 focus:outline-none focus:border-violetAccent mt-1">
                </div>
                <div>
                  <label class="text-[10px] text-zinc-400 font-bold uppercase">Margem Extra (%)</label>
                  <input type="number" min="0" max="100" name="marginPercentage" value="${state.form.marginPercentage}" oninput="updateFormLive('marginPercentage', this.value)" class="w-full bg-zinc-900 border border-border rounded-xl px-4 py-2.5 text-xs text-zinc-200 focus:outline-none focus:border-violetAccent mt-1">
                </div>
              </div>

              <!-- PAINEL OPERACIONAL DE CÁLCULO DILIGENTE -->
              <div id="formCalcPanel"></div>

              <div>
                <label class="text-[10px] text-zinc-400 font-bold uppercase">Observações da Alocação</label>
                <textarea name="notes" oninput="state.form.notes = this.value" class="w-full bg-zinc-900 border border-border rounded-xl px-4 py-2.5 text-xs text-zinc-200 focus:outline-none focus:border-violetAccent mt-1 h-12">${state.form.notes}</textarea>
              </div>

              <div class="flex gap-3 pt-2">
                <button type="button" onclick="closeModal()" class="flex-1 py-2.5 border border-border rounded-xl text-zinc-300 hover:bg-zinc-800 text-xs font-bold">Cancelar</button>
                <button type="submit" class="flex-1 py-2.5 bg-violetAccent hover:bg-violetAccentHover text-white rounded-xl text-xs font-bold">Salvar Inclusão</button>
              </div>
            </form>
          </div>
        `;
        // Forçar renderização do cálculo se já houver algo
        updateFormLive('notes', state.form.notes);
      } 
      
      else if (state.activeModal === 'remove_placement') {
        const pId = state.editingItem;
        overlay.innerHTML = `
          <div class="glass w-full max-w-md p-6 rounded-2xl border border-border space-y-4">
            <div class="flex justify-between items-center border-b border-border pb-3">
              <h3 class="text-base font-bold text-zinc-100">Marcar Música como Removida</h3>
              <button onclick="closeModal()" class="text-zinc-500 hover:text-white">${ICONS.close}</button>
            </div>
            
            <form onsubmit="handleRemovePlacementSubmit(event)" class="space-y-4">
              <input type="hidden" name="placementId" value="${pId}">
              
              <div>
                <label class="text-[10px] text-zinc-400 font-bold uppercase">Data Real de Remoção</label>
                <input type="date" name="realExitDate" required value="${state.currentDate}" class="w-full bg-zinc-900 border border-border rounded-xl px-4 py-2.5 text-xs text-zinc-200 focus:outline-none focus:border-violetAccent mt-1">
              </div>

              <div>
                <label class="text-[10px] text-zinc-400 font-bold uppercase">Comentários da Remoção</label>
                <textarea name="removalNotes" placeholder="Ex: Entrega finalizada de acordo com a meta." class="w-full bg-zinc-900 border border-border rounded-xl px-4 py-2.5 text-xs text-zinc-200 focus:outline-none focus:border-violetAccent mt-1 h-20"></textarea>
              </div>

              <div class="flex gap-3 pt-2">
                <button type="button" onclick="closeModal()" class="flex-1 py-2.5 border border-border rounded-xl text-zinc-300 hover:bg-zinc-800 text-xs font-bold">Cancelar</button>
                <button type="submit" class="flex-1 py-2.5 bg-violetAccent hover:bg-violetAccentHover text-white rounded-xl text-xs font-bold">Confirmar Saída</button>
              </div>
            </form>
          </div>
        `;
      }

      document.body.appendChild(overlay);
    }

    // ==========================================
    // SEÇÃO DE POSIÇÕES (ABRE MODAL ESPECIAL)
    // ==========================================
    function openPositionsManager(listId) {
      const list = state.lists.find(l => l.id === listId);
      if (!list) return;
      state.selectedListForPositions = list;
      
      const overlay = document.createElement('div');
      overlay.id = 'posManagerOverlay';
      overlay.className = 'fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto';
      
      // Renderizar conteúdo dinâmico
      updatePositionsManagerContent(overlay, list);
      
      document.body.appendChild(overlay);
    }

    function closePositionsManager() {
      const overlay = document.getElementById('posManagerOverlay');
      if (overlay) overlay.remove();
      state.selectedListForPositions = null;
      render();
    }

    function updatePositionsManagerContent(overlay, list) {
      const listPositions = state.positions
        .filter(p => p.list_id === list.id)
        .sort((a, b) => a.position_number - b.position_number);

      overlay.innerHTML = `
        <div class="glass w-full max-w-4xl p-6 rounded-2xl border border-border space-y-6 my-8">
          <div class="flex justify-between items-center border-b border-border pb-3">
            <div>
              <h3 class="text-lg font-bold text-zinc-100">Gerenciar Posições da Lista</h3>
              <p class="text-xs text-violetAccent font-semibold mt-0.5">Lista: ${list.name} (${listPositions.length} / 120 Posições)</p>
            </div>
            <button onclick="closePositionsManager()" class="text-zinc-500 hover:text-white">${ICONS.close}</button>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Lado Esquerdo: Listagem e Cadastro Manual -->
            <div class="space-y-6 lg:border-r lg:border-border/40 lg:pr-8">
              <!-- Cadastro Manual -->
              <div class="p-4 bg-zinc-900/40 border border-border rounded-xl space-y-3">
                <h4 class="text-xs font-bold uppercase text-zinc-300">Nova Posição Individual</h4>
                
                <form onsubmit="addManualPosition(event)" class="grid grid-cols-3 gap-2">
                  <div class="col-span-2">
                    <label class="text-[8px] text-zinc-500 font-bold uppercase">Label Posição</label>
                    <input type="text" name="posLabel" placeholder="Ex: TOP 33" required class="w-full bg-zinc-900 border border-border rounded-lg px-3 py-1.5 text-xs text-zinc-200 mt-1 focus:outline-none focus:border-violetAccent">
                  </div>
                  <div>
                    <label class="text-[8px] text-zinc-500 font-bold uppercase">Média Diária</label>
                    <input type="number" name="posAverage" placeholder="Ex: 505" required class="w-full bg-zinc-900 border border-border rounded-lg px-3 py-1.5 text-xs text-zinc-200 mt-1 focus:outline-none focus:border-violetAccent">
                  </div>
                  <div class="col-span-3">
                    <label class="text-[8px] text-zinc-500 font-bold uppercase">Número de Ordenação (Opcional)</label>
                    <input type="number" name="posNum" placeholder="Ex: 33" class="w-full bg-zinc-900 border border-border rounded-lg px-3 py-1.5 text-xs text-zinc-200 mt-1 focus:outline-none focus:border-violetAccent">
                  </div>
                  <div class="col-span-3 flex justify-end">
                    <button type="submit" class="px-4 py-1.5 bg-violetAccent hover:bg-violetAccentHover text-white text-[10px] font-bold rounded-lg transition-colors">
                      Adicionar Posição
                    </button>
                  </div>
                </form>
              </div>

              <!-- Posições Atuais -->
              <div class="space-y-3">
                <h4 class="text-xs font-bold uppercase text-zinc-300">Posições Cadastradas</h4>
                <div class="max-h-[250px] overflow-y-auto border border-border/50 rounded-xl">
                  <table class="w-full text-left text-xs border-collapse">
                    <thead>
                      <tr class="border-b border-border bg-zinc-900/50 text-zinc-500 text-[9px] uppercase">
                        <th class="p-3">Posição</th>
                        <th class="p-3 text-center">Ordenação</th>
                        <th class="p-3 text-center">Média diária/dia</th>
                        <th class="p-3 text-right">Ação</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-border/30">
                      ${listPositions.length === 0 ? `
                        <tr><td colSpan="4" class="p-4 text-center text-zinc-500">Nenhuma posição cadastrada.</td></tr>
                      ` : listPositions.map(pos => `
                        <tr class="hover:bg-zinc-900/10">
                          <td class="p-3 font-bold text-zinc-300">${pos.position_label}</td>
                          <td class="p-3 text-center text-zinc-400">${pos.position_number}</td>
                          <td class="p-3 text-center font-bold text-zinc-200">${pos.average_daily_deliveries.toLocaleString()}</td>
                          <td class="p-3 text-right">
                            <button onclick="deletePosition('${pos.id}'); updatePositionsManagerContent(document.getElementById('posManagerOverlay'), state.selectedListForPositions);" class="text-red-400 hover:underline text-[10px]">Excluir</button>
                          </td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <!-- Lado Direito: Importação Lote -->
            <div class="space-y-4">
              <div class="p-4 bg-zinc-900/40 border border-border rounded-xl space-y-3">
                <h4 class="text-xs font-bold uppercase text-zinc-300">Importar em Massa (Colar Texto)</h4>
                <p class="text-[10px] text-zinc-500 leading-relaxed">
                  Cole uma lista de posições e médias diárias. Cada linha é uma posição.
                  <br><strong>Exemplo:</strong>
                  <br>TOP 1,2000
                  <br>TOP 2,1700
                  <br>TOP 33,505
                </p>
                <form onsubmit="importPositionsBulk(event); updatePositionsManagerContent(document.getElementById('posManagerOverlay'), state.selectedListForPositions);" class="space-y-3">
                  <textarea name="bulkText" rows="6" placeholder="Cole a lista aqui..." class="w-full bg-zinc-900 border border-border rounded-xl p-3 text-xs focus:outline-none focus:border-violetAccent text-zinc-200 font-mono"></textarea>
                  <div class="flex justify-end">
                    <button type="submit" class="px-5 py-2 bg-violetAccent hover:bg-violetAccentHover text-white text-xs font-bold rounded-xl transition-colors">
                      Importar Posições
                    </button>
                  </div>
                </form>
              </div>

              <div class="p-4 bg-zinc-900/20 border border-border/50 rounded-xl text-[10px] text-zinc-500 space-y-1">
                <h4 class="font-bold text-zinc-400">Instruções Importantes</h4>
                <p>• Máximo de 120 posições por lista.</p>
                <p>• Formato esperado por linha: "Nome_da_Posição, Média_Diária".</p>
              </div>
            </div>
          </div>

          <div class="pt-3 border-t border-border flex justify-end">
            <button onclick="closePositionsManager()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl text-xs font-bold transition-colors">Fechar</button>
          </div>
        </div>
      `;
    }

    // ==========================================
    // SEÇÃO DE HISTÓRICO DE MÚSICA
    // ==========================================
    function openHistoryModal(trackId) {
      const track = state.tracks.find(t => t.id === trackId);
      if (!track) return;
      state.selectedTrackForHistory = track;

      const overlay = document.createElement('div');
      overlay.id = 'historyModalOverlay';
      overlay.className = 'fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto';

      const trackPlacements = state.placements
        .filter(p => p.track_id === trackId)
        .map(p => {
          const listObj = state.lists.find(l => l.id === p.list_id);
          const posObj = state.positions.find(pos => pos.id === p.position_id);
          return {
            ...p,
            listName: listObj ? listObj.name : 'Desconhecida',
            positionLabel: posObj ? posObj.position_label : 'Desconhecida'
          };
        });

      overlay.innerHTML = `
        <div class="glass w-full max-w-3xl p-6 rounded-2xl border border-border space-y-4">
          <div class="flex justify-between items-center border-b border-border pb-3">
            <div>
              <h3 class="text-base font-bold text-zinc-100">Histórico de Alocações</h3>
              <p class="text-xs text-violetAccent font-semibold mt-0.5">${track.artist_name} — ${track.track_name}</p>
            </div>
            <button onclick="closeHistoryModal()" class="text-zinc-500 hover:text-white">${ICONS.close}</button>
          </div>

          <div class="space-y-4">
            ${trackPlacements.length === 0 ? `
              <div class="text-center py-12 text-zinc-500 text-sm">Esta música ainda não foi alocada em nenhuma lista.</div>
            ` : `
              <div class="overflow-x-auto border border-border/50 rounded-xl">
                <table class="w-full text-left text-xs border-collapse">
                  <thead>
                    <tr class="border-b border-border bg-zinc-900/40 text-zinc-400 font-semibold uppercase text-[9px]">
                      <th class="p-3">Lista / Posição</th>
                      <th class="p-3 text-center">Média diária</th>
                      <th class="p-3 text-center">Período (Dias)</th>
                      <th class="p-3 text-center">Datas In / Out</th>
                      <th class="p-3 text-center">Volume Estimado</th>
                      <th class="p-3 text-center">Status</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-border/40">
                    ${trackPlacements.map(item => `
                      <tr class="hover:bg-zinc-900/10">
                        <td class="p-3">
                          <div class="font-bold text-zinc-200">${item.listName}</div>
                          <div class="text-violetAccent text-[9px] mt-0.5">${item.positionLabel}</div>
                        </td>
                        <td class="p-3 text-center text-zinc-300 font-semibold">${item.average_daily_deliveries}</td>
                        <td class="p-3 text-center text-zinc-300">${item.required_days} dias</td>
                        <td class="p-3 text-center text-[10px] text-zinc-400 space-y-0.5">
                          <div>In: ${item.entry_date.split('-').reverse().join('/')}</div>
                          <div>Out: ${item.estimated_exit_date.split('-').reverse().join('/')}</div>
                          ${item.real_exit_date ? `<div class="text-red-400 font-semibold">Rem: ${item.real_exit_date.split('-').reverse().join('/')}</div>` : ''}
                        </td>
                        <td class="p-3 text-center text-zinc-200 font-bold">${item.estimated_deliveries.toLocaleString()}</td>
                        <td class="p-3 text-center">
                          <span class="px-2 py-0.5 rounded-full font-bold text-[8px] border ${
                            item.status === 'active' ? 'bg-violetAccent/10 text-violetAccent border-violetAccent/20' : 'bg-zinc-800 text-zinc-500 border-border'
                          }">${item.status.toUpperCase()}</span>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `}
          </div>

          <div class="pt-3 border-t border-border flex justify-end">
            <button onclick="closeHistoryModal()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl text-xs font-bold transition-colors">Fechar</button>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);
    }

    function closeHistoryModal() {
      const overlay = document.getElementById('historyModalOverlay');
      if (overlay) overlay.remove();
      state.selectedTrackForHistory = null;
    }

    // --- INICIALIZAÇÃO DA APLICAÇÃO ---
    window.onload = function() {
      // Pequeno timeout para dar sensação de aplicativo real
      setTimeout(() => {
        render();
      }, 300);
    };
  </script>
</body>
</html>
